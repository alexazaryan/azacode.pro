<!doctype html>
<html lang="ru">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>AzaCode | Заявка на сайт</title>
      <link rel="icon" type="image/png" sizes="32x32" href="../img/logo.png" />
      <link rel="apple-touch-icon" sizes="180x180" href="../img/logo.png" />
      <meta property="og:title" content="AzaCode | Заявка на сайт" />
      <meta
         property="og:description"
         content="Разработка сайтов под ключ — оставьте заявку"
      />
      <meta property="og:image" content="https://azacode.pro/img/logo.png" />
      <meta property="og:url" content="https://azacode.pro/form" />
      <meta property="og:type" content="website" />
      <link
         href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap"
         rel="stylesheet"
      />
      <link
         rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      />

      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         :root {
            --pink: #ff1493;
            --orange: #ffa500;
            --yellow: #ffd700;
            --card-bg: #16213e;
            --text-primary: #eeeeee;
            --text-secondary: #cccccc;
            --border-light: #2a2a4a;
         }

         body {
            font-family: "Inter", sans-serif;
            background: linear-gradient(
               135deg,
               #1a1a3e 0%,
               #1e1e3a 50%,
               #16213e 100%
            );
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
         }

         .wrap {
            max-width: 480px;
            width: 100%;
         }

         .logo {
            font-size: 28px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
            background: linear-gradient(
               135deg,
               var(--pink),
               var(--orange),
               var(--yellow)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         .hero-badge {
            display: block;
            width: fit-content;
            margin: 0 auto 20px;
            background: var(--yellow);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            text-align: center;
         }

         h1 {
            font-size: clamp(28px, 6vw, 38px);
            font-weight: 800;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 14px;
         }

         h1 .accent {
            background: linear-gradient(
               135deg,
               var(--pink),
               var(--orange),
               var(--yellow)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         .sub {
            text-align: center;
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.5;
         }

         .price-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
         }

         .price-row span {
            background: linear-gradient(
               135deg,
               var(--pink),
               var(--orange),
               var(--yellow)
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
         }

         .form-group {
            margin-bottom: 18px;
            position: relative;
         }

         .form-group input,
         .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-light);
            border-radius: 16px;
            font-family: inherit;
            background: #1a1a2e;
            color: var(--text-primary);
            font-size: 15px;
            transition: border 0.3s;
         }

         .form-group input:focus,
         .form-group textarea:focus {
            outline: none;
            border-color: var(--pink);
         }

         .form-group textarea {
            min-height: 90px;
            resize: vertical;
         }

         .radio-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
         }

         .contact-method {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
         }

         .radio-option {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 14px;
            border: 2px solid var(--border-light);
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
            transition: all 0.3s;
            flex: 1;
         }

         .radio-option i {
            font-size: 15px;
            line-height: 1;
         }

         .radio-option span {
            display: flex;
            align-items: center;
            gap: 6px;
            line-height: 1;
         }

         .radio-option input {
            display: none;
         }

         .radio-option:has(input:checked) {
            background: linear-gradient(135deg, var(--pink), var(--orange));
            border-color: transparent;
         }

         .submit-btn {
            background: linear-gradient(135deg, var(--pink), var(--orange));
            color: #fff;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.3s;
         }

         .submit-btn:hover {
            transform: translateY(-2px);
         }

         .submit-btn.success {
            background: linear-gradient(135deg, #0f0, #ffd700);
         }

         .error-msg {
            display: block;
            color: #ff6b6b;
            font-size: 12px;
            margin-top: 5px;
            min-height: 16px;
         }

         .char-counter {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
         }

         .site-link {
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 12px;
         }

         .site-link a {
            color: var(--pink);
            text-decoration: underline;
            margin-left: 4px;
         }

         .trust-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
         }

         .trust-row span {
            display: flex;
            align-items: center;
            gap: 6px;
         }

         .trust-row i {
            color: var(--pink);
         }

         /* Модалка выбора языка при первом заходе */
         .lang-select-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.3s ease;
         }

         .lang-select-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
         }

         .lang-select-modal {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 2.75rem 2.25rem;
            text-align: center;
            width: 290px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
         }

         .lang-select-title {
            font-weight: 500;
            font-size: 19px;
            margin-bottom: 2rem;
            color: var(--text-primary);
         }

         .lang-select-buttons {
            display: flex;
            gap: 10px;
         }

         .lang-select-btn {
            flex: 1;
            padding: 15px 10px;
            border-radius: 16px;
            border: 2px solid var(--border-light);
            background: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
         }

         .lang-select-btn:hover {
            background: linear-gradient(135deg, var(--pink), var(--orange));
            border-color: transparent;
         }
      </style>
   </head>

   <body>
      <!-- Модалка выбора языка при первом заходе -->
      <div class="lang-select-overlay" id="langSelectOverlay">
         <div class="lang-select-modal">
            <p class="lang-select-title">RU / UA</p>
            <div class="lang-select-buttons">
               <button class="lang-select-btn" data-lang="ru">Русский</button>
               <button class="lang-select-btn" data-lang="uk">
                  Українська
               </button>
            </div>
         </div>
      </div>

      <div class="wrap">
         <div class="logo">&lt;AzaCode/&gt;</div>
         <div class="hero-badge" id="heroBadge">
            Фиксированная цена, без сюрпризов
         </div>
         <h1>
            <span id="h1Part1">Нужен сайт,</span>
            <span class="accent" id="h1Part2">который продаёт?</span>
         </h1>
         <p class="sub" id="subText">
            Заполните форму — мы напишем вам в выбранный мессенджер в рабочее
            время. Ночные заявки обработаем с утра
         </p>

         <div class="price-row" id="priceRow">
            <span id="price1">Сайт-визитка от $150</span>
            <span id="price2">Магазин от $350</span>
         </div>

         <div class="card">
            <form id="requestForm">
               <div
                  style="position: absolute; left: -9999px; top: -9999px"
                  aria-hidden="true"
               >
                  <input
                     type="text"
                     id="website"
                     name="website"
                     tabindex="-1"
                     autocomplete="off"
                  />
               </div>

               <div class="form-group">
                  <input
                     type="text"
                     id="userName"
                     placeholder="Ваше имя"
                     required
                     maxlength="40"
                  />
                  <span class="error-msg" id="nameError"></span>
               </div>

               <div class="form-group">
                  <label class="radio-label" id="contactMethodLabel"
                     >Выберите способ связи</label
                  >
                  <div class="contact-method" id="contactMethod">
                     <label class="radio-option">
                        <input
                           type="radio"
                           name="contactMethod"
                           value="Telegram"
                           checked
                           required
                        />
                        <span><i class="fab fa-telegram"></i> Telegram</span>
                     </label>
                     <label class="radio-option">
                        <input
                           type="radio"
                           name="contactMethod"
                           value="Viber"
                        />
                        <span><i class="fab fa-viber"></i> Viber</span>
                     </label>
                     <label class="radio-option">
                        <input
                           type="radio"
                           name="contactMethod"
                           value="WhatsApp"
                        />
                        <span><i class="fab fa-whatsapp"></i> WhatsApp</span>
                     </label>
                  </div>
                  <span class="error-msg" id="methodError"></span>
               </div>

               <div class="form-group">
                  <input
                     type="text"
                     id="userContact"
                     placeholder="+380 XX XXX XX XX"
                     required
                     maxlength="30"
                  />
                  <span class="error-msg" id="contactError"></span>
               </div>

               <div class="form-group">
                  <textarea
                     id="userMessage"
                     placeholder="Кратко опишите задачу: какой сайт нужен, сроки, бюджет"
                     required
                     maxlength="99"
                  ></textarea>
                  <span class="char-counter" id="charCounter">0 / 99</span>
                  <span class="error-msg" id="messageError"></span>
               </div>

               <button type="submit" class="submit-btn" id="submitBtn">
                  📩 Отправить заявку →
               </button>
            </form>

            <p class="site-link" id="siteLink">
               <span id="siteLinkText">Наш сайт</span>&nbsp;
               <a href="https://azacode.pro" target="_blank">azacode.pro</a>
            </p>

            <!-- <div class="trust-row">
               <span
                  ><i class="fas fa-check-circle"></i>
                  <span id="trust1">Без предоплаты</span></span
               >
               <span
                  ><i class="fas fa-code"></i>
                  <span id="trust2">Код — ваш</span></span
               >
            </div> -->
         </div>
      </div>

      <script src="../notify.js"></script>
      <script src="form-script.js"></script>
   </body>
</html>
